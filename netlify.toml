[build]
  command = "npm run build"
  publish = "dist"

# Security Headers — ALL routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://images.pexels.com https://pixabay.com; connect-src 'self' https://www.google-analytics.com https://my-api.plantnet.org https://api.anthropic.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Domain redirects
[[redirects]]
  from = "https://gardeningcyprus.com/*"
  to = "https://greenplanetgardening.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.gardeningcyprus.com/*"
  to = "https://greenplanetgardening.eu/:splat"
  status = 301
  force = true

# Legacy URL redirects (old German URLs)
[[redirects]]
  from = "/kontakt"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/leistungen"
  to = "/services"
  status = 301

# Cache headers for static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
